# This workflow validates the package and publishes it to npm via GitHub OIDC
# trusted publishing when a GitHub release is published.

name: Node.js Package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      # This package does not commit a package-lock.json, so release jobs
      # must use npm install instead of npm ci.
      - run: npm install
      - run: npm run typecheck
      - run: npm run build
      - run: npm publish
